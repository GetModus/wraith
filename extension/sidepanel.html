<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODUS Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-hover: #2e2e2e;
      --border: #333;
      --text: #d4d4d4;
      --text-dim: #888;
      --accent: #4ade80;
      --accent-dim: #166534;
      --error: #f87171;
      --error-dim: #7f1d1d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Mono", "Fira Code", monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* --- Header --- */
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .status-text {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* --- Actions --- */
    .actions {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: var(--accent-dim);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .btn-primary {
      border-color: var(--accent-dim);
      background: rgba(74, 222, 128, 0.08);
    }

    .btn-primary:hover {
      background: rgba(74, 222, 128, 0.15);
    }

    /* --- Feedback --- */
    .feedback {
      padding: 0 16px;
      min-height: 24px;
    }

    .feedback-msg {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      animation: fadeIn 0.2s ease;
    }

    .feedback-msg.success {
      background: rgba(74, 222, 128, 0.1);
      color: var(--accent);
    }

    .feedback-msg.error {
      background: rgba(248, 113, 113, 0.1);
      color: var(--error);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Activity Log --- */
    .section-label {
      padding: 12px 16px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .activity-log {
      padding: 0 16px;
      flex: 1;
      overflow-y: auto;
    }

    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-message {
      font-size: 12px;
      color: var(--text);
      word-break: break-word;
    }

    .log-time {
      font-size: 10px;
      color: var(--text-dim);
    }

    .log-empty {
      padding: 20px 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      font-style: italic;
    }

    /* --- Settings --- */
    .settings {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .settings-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .settings input {
      flex: 1;
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
    }

    .settings input:focus {
      outline: none;
      border-color: var(--accent-dim);
    }

    .settings button {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .settings button:hover {
      border-color: var(--accent-dim);
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <div class="header-title">MODUS Bridge</div>
    <div class="status-text" id="statusText">Disconnected</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnArchive">
      <span class="btn-icon">&#8615;</span>
      Send to Archive
    </button>
    <button class="btn" id="btnResearch">
      <span class="btn-icon">&#8853;</span>
      Research This
    </button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="section-label">Recent Activity</div>
  <div class="activity-log" id="activityLog">
    <div class="log-empty">Standing by, General.</div>
  </div>

  <div class="settings">
    <div class="section-label" style="padding: 0 0 6px;">Daemon</div>
    <div class="settings-row">
      <input type="text" id="daemonUrl" placeholder="ws://localhost:8766/ws" />
      <button id="btnSaveUrl">Save</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
