<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </linearGradient>
    <!-- Signal capture pattern -->
    <pattern id="circuit" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#30363d" opacity="0.5"/>
      <line x1="30" y1="30" x2="60" y2="30" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
      <line x1="30" y1="30" x2="30" y2="0" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="900" height="300" fill="url(#circuit)" rx="12" opacity="0.6"/>

  <!-- Subtle glow line -->
  <rect x="50" y="198" width="800" height="2" fill="url(#accent)" rx="1" opacity="0.4"/>

  <!-- Capture signal icon (left side) -->
  <g transform="translate(80, 95)" opacity="0.9">
    <!-- Browser window frame -->
    <rect x="10" y="10" width="80" height="60" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="24" x2="90" y2="24" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
    <circle cx="22" cy="17" r="2.5" fill="#f85149" opacity="0.5"/>
    <circle cx="32" cy="17" r="2.5" fill="#d29922" opacity="0.5"/>
    <circle cx="42" cy="17" r="2.5" fill="#7ee787" opacity="0.5"/>

    <!-- Signal waves emanating right -->
    <path d="M 95,40 Q 108,30 108,40 Q 108,50 95,40" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.6"/>
    <path d="M 100,40 Q 118,25 118,40 Q 118,55 100,40" fill="none" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
    <path d="M 105,40 Q 128,20 128,40 Q 128,60 105,40" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.25"/>

    <!-- Content lines inside browser -->
    <rect x="18" y="32" width="40" height="3" rx="1.5" fill="#58a6ff" opacity="0.3"/>
    <rect x="18" y="40" width="60" height="3" rx="1.5" fill="#8b949e" opacity="0.2"/>
    <rect x="18" y="48" width="50" height="3" rx="1.5" fill="#8b949e" opacity="0.2"/>
    <rect x="18" y="56" width="35" height="3" rx="1.5" fill="#8b949e" opacity="0.15"/>
  </g>

  <!-- Title -->
  <text x="280" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#e6edf3" letter-spacing="-1">WRAITH</text>

  <!-- Subtitle -->
  <text x="280" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.5">Browser intelligence capture for personal knowledge vaults.</text>

  <!-- Feature pills -->
  <g transform="translate(280, 220)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="50" y="18" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">WebSocket</text>

    <rect x="110" y="0" width="90" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="155" y="18" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">Dedup</text>

    <rect x="210" y="0" width="110" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="265" y="18" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">5 Sources</text>

    <rect x="330" y="0" width="110" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="385" y="18" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">Local-Only</text>

    <rect x="450" y="0" width="90" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="495" y="18" font-family="monospace" font-size="11" fill="#7ee787" text-anchor="middle">~6MB</text>
  </g>
</svg>
