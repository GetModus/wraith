<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">SCOUT / LIBRARIAN HANDOFF</text>

  <!-- Capture arrives -->
  <rect x="310" y="48" width="180" height="38" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Capture Arrives</text>

  <!-- Arrow down -->
  <line x1="400" y1="86" x2="400" y2="116" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <polygon points="395,116 400,126 405,116" fill="#58a6ff" opacity="0.6"/>

  <!-- Scout.Assess() -->
  <rect x="310" y="128" width="180" height="38" rx="8" fill="#1c2333" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="400" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#bc8cff">Scout.Assess()</text>

  <!-- Decision diamond -->
  <polygon points="400,188 480,228 400,268 320,228" fill="#1c2333" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="400" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e6edf3" font-weight="600">verdict?</text>

  <!-- Arrow down from Scout to diamond -->
  <line x1="400" y1="166" x2="400" y2="188" stroke="#bc8cff" stroke-width="1.5" opacity="0.6"/>

  <!-- ========== LEFT BRANCH: keep ========== -->
  <line x1="320" y1="228" x2="145" y2="228" stroke="#7ee787" stroke-width="1.5" opacity="0.5"/>
  <polygon points="149,223 139,228 149,233" fill="#7ee787" opacity="0.5"/>
  <text x="232" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#7ee787" font-weight="600">keep</text>

  <!-- Librarian.File() box (keep) -->
  <rect x="30" y="210" width="110" height="36" rx="8" fill="#1c2333" stroke="#7ee787" stroke-width="1"/>
  <text x="85" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#7ee787">Librarian.File()</text>

  <!-- Arrow down from Librarian (keep) -->
  <line x1="85" y1="246" x2="85" y2="278" stroke="#7ee787" stroke-width="1.5" opacity="0.5"/>
  <polygon points="80,278 85,288 90,278" fill="#7ee787" opacity="0.5"/>

  <!-- Outputs box (keep) -->
  <rect x="17" y="290" width="136" height="82" rx="8" fill="#1c2333" stroke="#7ee787" stroke-width="1"/>
  <text x="85" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7ee787" font-weight="600">Outputs</text>
  <line x1="32" y1="316" x2="138" y2="316" stroke="#30363d" stroke-width="0.5"/>
  <rect x="32" y="324" width="106" height="18" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="85" y="337" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">vault .md</text>
  <rect x="32" y="346" width="106" height="18" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="85" y="359" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">handoff.jsonl</text>

  <!-- ========== RIGHT BRANCH: mission_candidate ========== -->
  <line x1="480" y1="228" x2="568" y2="228" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="568,223 578,228 568,233" fill="#58a6ff" opacity="0.5"/>
  <text x="524" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" font-weight="600">mission_candidate</text>

  <!-- Librarian.File() box (mission) -->
  <rect x="580" y="210" width="110" height="36" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1"/>
  <text x="635" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">Librarian.File()</text>

  <!-- Arrow down from Librarian (mission) -->
  <line x1="635" y1="246" x2="635" y2="278" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="630,278 635,288 640,278" fill="#58a6ff" opacity="0.5"/>

  <!-- Outputs box (mission) -->
  <rect x="562" y="290" width="146" height="100" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1"/>
  <text x="635" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#58a6ff" font-weight="600">Outputs (flagged)</text>
  <line x1="577" y1="316" x2="693" y2="316" stroke="#30363d" stroke-width="0.5"/>
  <rect x="577" y="324" width="116" height="18" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="635" y="337" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">vault .md</text>
  <rect x="577" y="346" width="116" height="18" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="635" y="359" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">handoff.jsonl</text>
  <rect x="577" y="368" width="116" height="16" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="0.5"/>
  <text x="635" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#d29922">mission_flag: true</text>

  <!-- ========== DOWN BRANCH: discard ========== -->
  <line x1="400" y1="268" x2="400" y2="308" stroke="#8b949e" stroke-width="1.5" opacity="0.4"/>
  <polygon points="395,308 400,318 405,308" fill="#8b949e" opacity="0.4"/>
  <text x="416" y="293" font-family="monospace" font-size="10" fill="#8b949e">discard</text>

  <!-- No Librarian label -->
  <rect x="332" y="320" width="136" height="24" rx="8" fill="#0d1117" stroke="#f85149" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="336" text-anchor="middle" font-family="monospace" font-size="10" fill="#f85149">No Librarian receipt</text>

  <!-- Arrow down to discard output -->
  <line x1="400" y1="344" x2="400" y2="368" stroke="#8b949e" stroke-width="1.5" opacity="0.4"/>
  <polygon points="395,368 400,378 405,368" fill="#8b949e" opacity="0.4"/>

  <!-- Outputs box (discard) -->
  <rect x="335" y="380" width="130" height="58" rx="8" fill="#1c2333" stroke="#8b949e" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">Audit Only</text>
  <line x1="350" y1="406" x2="450" y2="406" stroke="#30363d" stroke-width="0.5"/>
  <rect x="350" y="414" width="100" height="18" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="427" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">handoff.jsonl</text>

  <!-- Legend -->
  <rect x="30" y="454" width="445" height="18" rx="4" fill="none"/>
  <text x="35" y="468" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">All paths write to handoff.jsonl for audit. Only keep/mission_candidate produce vault markdown.</text>
</svg>
