<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">RUNTIME TOPOLOGY</text>

  <!-- Safari Extension Box -->
  <rect x="30" y="50" width="210" height="200" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="135" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Safari Extension</text>
  <line x1="50" y1="82" x2="220" y2="82" stroke="#30363d" stroke-width="0.5"/>

  <!-- Safari inner components -->
  <rect x="50" y="94" width="170" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">background.js</text>

  <rect x="50" y="130" width="170" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="149" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">content.js</text>

  <rect x="50" y="166" width="170" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Local Queue (200)</text>

  <text x="135" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Page capture + buffering</text>

  <!-- WebSocket Arrow -->
  <line x1="240" y1="130" x2="318" y2="130" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <polygon points="318,125 328,130 318,135" fill="#58a6ff" opacity="0.6"/>
  <text x="279" y="121" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="600">WS</text>

  <!-- MODUS Server Box -->
  <rect x="330" y="50" width="440" height="260" rx="8" fill="#1c2333" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="550" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">MODUS Server</text>
  <text x="658" y="74" font-family="monospace" font-size="11" fill="#8b949e">:8781</text>
  <line x1="350" y1="82" x2="750" y2="82" stroke="#30363d" stroke-width="0.5"/>

  <!-- HTTP Endpoints label -->
  <text x="365" y="102" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">HTTP Endpoints</text>

  <!-- Endpoint rows -->
  <rect x="365" y="110" width="385" height="26" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="128" font-family="monospace" font-size="11" fill="#58a6ff">/wraith/ws</text>
  <text x="520" y="128" font-family="monospace" font-size="10" fill="#8b949e">WraithBridge</text>

  <rect x="365" y="142" width="385" height="26" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="160" font-family="monospace" font-size="11" fill="#58a6ff">/wraith/status</text>
  <text x="540" y="160" font-family="monospace" font-size="10" fill="#8b949e">Queue.Stats()</text>

  <rect x="365" y="174" width="385" height="26" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="192" font-family="monospace" font-size="11" fill="#58a6ff">/wraith/queue</text>
  <text x="536" y="192" font-family="monospace" font-size="10" fill="#8b949e">Queue.Pending()</text>

  <rect x="365" y="206" width="385" height="26" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="224" font-family="monospace" font-size="11" fill="#58a6ff">/wraith/sources</text>
  <text x="545" y="224" font-family="monospace" font-size="10" fill="#8b949e">State.Stats()</text>

  <!-- Heartbeat section -->
  <line x1="350" y1="244" x2="750" y2="244" stroke="#30363d" stroke-width="0.5"/>
  <text x="365" y="264" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e" font-weight="600">Heartbeat Cadences</text>

  <rect x="365" y="274" width="180" height="22" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#bc8cff">Ingestion (2h) → ProcessQueue</text>

  <rect x="560" y="274" width="180" height="22" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="650" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#bc8cff">Triage (4h) → Classify</text>

  <!-- Arrow down to Vault -->
  <line x1="550" y1="310" x2="550" y2="355" stroke="#7ee787" stroke-width="1.5" opacity="0.5"/>
  <polygon points="545,355 550,365 555,355" fill="#7ee787" opacity="0.5"/>

  <!-- Vault Box -->
  <rect x="330" y="370" width="440" height="110" rx="8" fill="#1c2333" stroke="#7ee787" stroke-width="1.5"/>
  <text x="550" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#7ee787" font-weight="600">Vault</text>
  <text x="550" y="410" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">~/modus/data/</text>
  <line x1="350" y1="418" x2="750" y2="418" stroke="#30363d" stroke-width="0.5"/>

  <!-- Vault directories -->
  <rect x="360" y="428" width="88" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="404" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">brain/x/</text>

  <rect x="458" y="428" width="100" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="508" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">brain/reddit/</text>

  <rect x="568" y="428" width="100" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="618" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">brain/github/</text>

  <rect x="678" y="428" width="80" height="28" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="718" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">brain/yt/</text>

  <rect x="360" y="462" width="100" height="14" rx="4" fill="none"/>
  <text x="410" y="473" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e" opacity="0.6">brain/captures/</text>
</svg>
